<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <div id="container">
        <div id="grid-container">
            <aside id="page-buttons">
                <button class="page-buttons" onclick="changePage('page1')"><h2>Page 1</h2></button>
                <div id="button-group">
                    <button class="page-buttons" onclick="changePage('page2')"><h2>Page 2</h2></button>
                    <button class="page-buttons" id="page2_1" onclick="scrollPage22()"><p>2.1</p></button>
                </div>
            </aside>
    
            <div id="header"></div>
    
            <main class="info-grid" id="main-content"></main>

            <div id="flip-card-container">
                <div class="flip-card">
                    <div class="flip-card-inner">
                        <div class="flip-card-front" onclick="flipCard(this)">
                            <h1>click me!</h1>
                        </div>
                        <div class="flip-card-back">
                            <h1>Hello!</h1>
                        </div>
                    </div>
                </div>
            </div>

            <footer>copyright © ikanop</footer>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
